name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Browser
        run: bunx playwright install --with-deps chromium

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test
